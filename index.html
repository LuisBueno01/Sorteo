<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🎰 Tómbola FIEE-UV — Sorteo 2026</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    :root {
      --primary: #1e40af; --primary-dark: #1e3a8a; --primary-light: #3b82f6;
      --secondary: #60a5fa; --background: #f8fafc; --surface: #ffffff;
      --surface-alt: #f1f5f9; --text-primary: #0f172a; --text-secondary: #475569;
      --border: #e2e8f0; --success: #10b981; --error: #ef4444; --warning: #f59e0b;
      --gold: #fbbf24; --gold-light: #fcd34d; --gold-dark: #d97706;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.15); --shadow-xl: 0 20px 50px rgba(0,0,0,0.3);
      --radius: 20px; --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 40%, #312e81 100%);
      color: var(--text-primary); line-height: 1.5; min-height: 100vh;
      overflow-x: hidden; position: relative;
    }

    /* ===== FONDO ESTRELLADO ===== */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute; width: 2px; height: 2px; background: white;
      border-radius: 50%; animation: twinkle 3s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
    }

    /* ===== HEADER ===== */
    .header {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: clamp(0.75rem, 3vw, 1.25rem);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .logo-circle {
      width: 44px; height: 44px; background: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: var(--primary);
      box-shadow: 0 2px 15px rgba(251, 191, 36, 0.4);
    }
    .header-text h1 { font-size: clamp(1rem, 3vw, 1.3rem); font-weight: 800; color: white; }
    .header-text p { font-size: 0.8rem; color: rgba(255,255,255,0.7); }
    .header-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 0.8rem; font-weight: 600; border-radius: 8px;
      text-decoration: none; transition: var(--transition); cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
    .btn.primary { background: var(--gold); color: #1e3a8a; border-color: var(--gold); }
    .btn.primary:hover { background: var(--gold-light); }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .main-container {
      position: relative; z-index: 10;
      max-width: 800px; margin: 1rem auto 2rem;
      padding: 0 clamp(1rem, 4vw, 2rem);
      display: flex; flex-direction: column; align-items: center;
    }

    /* ===== COUNTER ===== */
    .counter-bar {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px; padding: 0.5rem 1.25rem;
      margin-bottom: 1.5rem; color: rgba(255,255,255,0.9);
      font-weight: 600; font-size: 0.9rem;
      backdrop-filter: blur(8px);
    }
    .counter-bar i { color: var(--gold); }

    /* ===== TÓMBOLA ===== */
    .tombola-wrapper {
      position: relative;
      width: clamp(260px, 70vw, 380px);
      height: clamp(260px, 70vw, 380px);
      margin: 0 auto;
    }

    /* Resplandor exterior */
    .tombola-glow {
      position: absolute; inset: -20px;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    .tombola-glow.spinning {
      background: radial-gradient(circle, rgba(251, 191, 36, 0.4) 0%, transparent 70%);
      animation: glowSpin 0.5s ease-in-out infinite;
    }
    @keyframes glowSpin {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    /* Tambor externo (marco) */
    .tombola-outer {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4a017, #b8860b, #8B6508, #d4a017);
      box-shadow: 
        inset 0 0 30px rgba(0,0,0,0.5),
        0 0 0 8px rgba(251, 191, 36, 0.3),
        0 0 60px rgba(251, 191, 36, 0.2),
        0 10px 40px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .tombola-outer::before {
      content: '';
      position: absolute; inset: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a3e, #2d1b69, #1a1a3e);
      border: 3px solid rgba(251, 191, 36, 0.5);
    }

    /* Tambor giratorio (interior) */
    .tombola-inner {
      position: relative;
      width: 85%; height: 85%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1e1b4b, #0f0a2e);
      overflow: hidden;
      z-index: 2;
      transition: transform 0.1s;
    }
    .tombola-inner.spinning {
      animation: drumSpin 0.3s linear infinite;
    }
    .tombola-inner.slowing {
      animation: drumSlow 2s ease-out forwards;
    }
    @keyframes drumSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes drumSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(1080deg); }
    }

    /* Barras internas del tambor */
    .drum-bar {
      position: absolute;
      top: 50%; left: 50%;
      width: 90%; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(251,191,36,0.15), transparent);
      transform-origin: center;
      border-radius: 2px;
    }

    /* ===== BOLAS DENTRO DE LA TÓMBOLA ===== */
    .ball {
      position: absolute;
      width: clamp(22px, 6vw, 34px);
      height: clamp(22px, 6vw, 34px);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #e5e7eb, #9ca3af);
      box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(8px, 2.5vw, 12px);
      font-weight: 800; color: #1e3a8a;
      animation: ballBounce 1.5s ease-in-out infinite;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 3;
    }
    .ball::after {
      content: '';
      position: absolute; top: 15%; left: 20%;
      width: 30%; height: 25%;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    .ball.winner {
      width: clamp(30px, 8vw, 42px);
      height: clamp(30px, 8vw, 42px);
      background: radial-gradient(circle at 30% 30%, #fef3c7, var(--gold), var(--gold-dark));
      box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 0 0 15px rgba(251,191,36,0.6);
      font-size: clamp(10px, 3vw, 14px);
    }

    @keyframes ballBounce {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-15px) translateX(8px); }
      50% { transform: translateY(-5px) translateX(-8px); }
      75% { transform: translateY(-20px) translateX(4px); }
    }

    .ball.spinning {
      animation: ballSpin 0.5s ease-in-out infinite;
    }
    @keyframes ballSpin {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(20px, -10px) rotate(90deg); }
      50% { transform: translate(-10px, -20px) rotate(180deg); }
      75% { transform: translate(-20px, 5px) rotate(270deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    /* Reflejo de cristal */
    .glass-reflection {
      position: absolute; inset: 0; border-radius: 50%; z-index: 5;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.05) 100%);
      pointer-events: none;
    }

    /* ===== SOPORTE DE LA TÓMBOLA ===== */
    .tombola-stand {
      width: clamp(100px, 25vw, 160px);
      height: 40px;
      background: linear-gradient(180deg, #8B6508, #654a06);
      border-radius: 0 0 20px 20px;
      margin: -10px auto 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      position: relative; z-index: 1;
    }
    .tombola-stand::before {
      content: '';
      position: absolute; bottom: -10px; left: 50%;
      transform: translateX(-50%);
      width: clamp(120px, 30vw, 200px);
      height: 12px;
      background: linear-gradient(180deg, #654a06, #4a3505);
      border-radius: 0 0 12px 12px;
    }

    /* ===== BOLETA DEL GANADOR ===== */
    .ticket-display {
      margin-top: 1.5rem;
      perspective: 1000px;
      min-height: 80px;
    }
    .ticket {
      display: none;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 3px solid var(--gold);
      border-radius: var(--radius-sm);
      padding: 1.25rem 1.5rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(251, 191, 36, 0.3);
      animation: ticketFlip 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
    }
    .ticket.show { display: block; }
    @keyframes ticketFlip {
      0% { transform: rotateY(180deg) scale(0.5); opacity: 0; }
      60% { transform: rotateY(-10deg) scale(1.05); }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }
    .ticket::before {
      content: '⭐'; position: absolute; top: -10px; right: -10px;
      font-size: 3rem; opacity: 0.15;
    }
    .ticket-label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--gold-dark); margin-bottom: 0.5rem;
    }
    .ticket-name {
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      font-weight: 900; color: var(--primary-dark);
      margin-bottom: 0.5rem;
    }
    .ticket-info {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      font-size: 0.85rem; color: var(--text-secondary);
    }
    .ticket-info span {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.6);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ===== BOTÓN DE SORTEO ===== */
    .draw-btn-container { margin-top: 2rem; text-align: center; }
    .draw-btn {
      background: linear-gradient(135deg, var(--gold), var(--warning), var(--gold));
      background-size: 200% 200%;
      animation: shimmer 3s ease-in-out infinite;
      color: var(--primary-dark);
      border: 3px solid var(--gold-dark);
      padding: 1rem 3rem;
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      font-weight: 900;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      transition: var(--transition);
      box-shadow: 
        0 6px 30px rgba(251, 191, 36, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .draw-btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 40px rgba(251, 191, 36, 0.6);
    }
    .draw-btn:active:not(:disabled) { transform: scale(0.97); }
    .draw-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .draw-btn .spinner {
      display: none; width: 22px; height: 22px;
      border: 3px solid rgba(30, 64, 175, 0.3);
      border-top-color: var(--primary-dark);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .draw-btn.loading .btn-text { display: none; }
    .draw-btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== HISTORIAL DE GANADORES ===== */
    .history {
      margin-top: 2.5rem; width: 100%; max-width: 500px;
    }
    .history-title {
      color: rgba(255,255,255,0.8);
      font-size: 1rem; font-weight: 700;
      text-align: center; margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .history-list {
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .history-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      animation: slideIn 0.4s ease-out;
      backdrop-filter: blur(4px);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .history-num {
      width: 32px; height: 32px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem; color: var(--primary-dark);
      flex-shrink: 0;
    }
    .history-details { flex: 1; }
    .history-name { color: white; font-weight: 700; font-size: 0.95rem; }
    .history-extra { color: rgba(255,255,255,0.6); font-size: 0.8rem; }
    .history-time { color: var(--gold); font-size: 0.75rem; font-weight: 600; }

    /* ===== CONFETI ===== */
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 200; overflow: hidden;
    }
    .confetti {
      position: absolute; opacity: 0;
      animation: confetti-fall 3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center; padding: 2rem; color: rgba(255,255,255,0.5);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 0.5rem; display: block; opacity: 0.3; }
    .status-msg {
      margin-top: 1rem; text-align: center; font-size: 0.85rem;
      color: rgba(255,255,255,0.7); min-height: 1.2rem;
    }
    .status-msg.error { color: var(--error); }
    .status-msg.success { color: var(--success); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: flex-start; }
      .header-actions { width: 100%; justify-content: flex-end; }
      .tombola-wrapper { width: clamp(230px, 80vw, 320px); height: clamp(230px, 80vw, 320px); }
      .draw-btn { padding: 0.9rem 2rem; font-size: 1rem; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>

    const el = $('status-msg');
    el.textContent = msg;
    el.className = `status-msg ${tipo}`;
  }

  // ===== CREAR ESTRELLAS DE FONDO =====
  function crearEstrellas() {
    const container = $('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
      container.appendChild(star);
    }
  }

  // ===== CREAR BOLAS EN LA TÓMBOLA =====
  function crearBolas() {
    const drum = $('tombola-inner');
    // Limpiar bolas existentes (excepto barras y reflejo)
    drum.querySelectorAll('.ball').forEach(b => b.remove());
    ballElements = [];

    const count = Math.min(alumnos.length, 20); // Máximo 20 bolas visibles
    for (let i = 0; i < count; i++) {
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.textContent = i + 1;
      ball.style.left = (10 + Math.random() * 70) + '%';
      ball.style.top = (10 + Math.random() * 70) + '%';
      ball.style.animationDelay = (Math.random() * 1.5) + 's';
      ball.style.animationDuration = (1 + Math.random() * 1) + 's';
      drum.appendChild(ball);
      ballElements.push(ball);
    }
  }

  // ===== ANIMAR BOLAS DURANTE SORTEO =====
  function animarBolas(spinning) {
    ballElements.forEach(ball => {
      if (spinning) {
        ball.classList.add('spinning');
        ball.style.animationDuration = (0.1 + Math.random() * 0.2) + 's';
        ball.style.animationDelay = (Math.random() * 0.1) + 's';
      } else {
        ball.classList.remove('spinning');
        ball.style.animationDuration = (1 + Math.random() * 1) + 's';
        ball.style.animationDelay = (Math.random() * 1.5) + 's';
      }
    });
  }

  // ===== CARGAR ALUMNOS DESDE FIREBASE =====
  async function cargarAlumnos() {
    if (!db) return;
    try {
      mostrarMensaje('Cargando alumnos...');
      const q = query(collection(db, "registros_fiee"), where("tipo", "==", "alumno"));
      const snapshot = await getDocs(q);
      alumnos = snapshot.docs.map(doc => {
        const data = doc.data();
        return {
          nombre: data.nombre || 'Sin nombre',
          identificador: data.identificador || '—',
          area: data.area || '—',
          semestre: data.semestre || ''
        };
      }).filter(a => a.nombre !== 'Sin nombre');
      console.log(`📚 ${alumnos.length} alumnos cargados`);
      crearBolas();
      actualizarUI();
    } catch (error) {
      console.error("❌ Error:", error);
      mostrarMensaje('Error al cargar datos. Modo demo activo.', 'error');
    }
  }

  // ===== ACTUALIZAR UI =====
 function actualizarUI() {
    const count = $('participants-count');
    const empty = $('empty-state');
    const btn = $('draw-btn');
    const wrapper = $('tombola-wrapper');
    const stand = $('tombola-stand');
    
    // Si no hay alumnos cargados aún, no hacemos nada
    if (!count) return; 

    if (alumnos.length === 0) {
        count.textContent = '0 participantes';
        if (empty) empty.hidden = false;
        if (wrapper) wrapper.style.display = 'none';
        if (stand) stand.style.display = 'none';
        if (btn) btn.disabled = true;
    } else {
        count.textContent = `${alumnos.length} alumno${alumnos.length > 1 ? 's' : ''}`;
        if (empty) empty.hidden = true;
        if (wrapper) wrapper.style.display = '';
        if (stand) stand.style.display = '';
        if (btn) btn.disabled = false;
    }
}

  // ===== LÓGICA DEL SORTEO =====
  window.iniciarSorteo = function() {
    if (sorteoActivo || alumnos.length === 0) return;
    
    sorteoActivo = true;
    const btn = $('draw-btn');
    const drum = $('tombola-inner');
    const glow = $('tombola-glow');
    const ticket = $('ticket');

    // Reset
    ticket.classList.remove('show');
    btn.classList.add('loading');
    btn.disabled = true;
    
    // Fase 1: Girar tómbola rápido
    glow.classList.add('spinning');
    drum.classList.add('spinning');
    animarBolas(true);
    mostrarMensaje('🔄 ¡Mezclando bolas...');
    
    // Fase 2: Desacelerar
    setTimeout(() => {
      mostrarMensaje('⏳ Seleccionando ganador...');
      drum.classList.remove('spinning');
      drum.classList.add('slowing');
      animarBolas(false);
    }, 2500);
    
    // Fase 3: Mostrar ganador
    setTimeout(() => {
      drum.classList.remove('slowing');
      glow.classList.remove('spinning');
      
      // Seleccionar ganador
      const disponible = alumnos.filter(a => !ganadores.find(g => g.identificador === a.identificador));
      const pool = disponible.length > 0 ? disponible : alumnos;
      const ganador = pool[Math.floor(Math.random() * pool.length)];
      ganador.hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      ganadores.push(ganador);
      
      // Mostrar boleta
      $('ticket-name').textContent = ganador.nombre;
      $('ticket-matricula').textContent = ganador.identificador;
      $('ticket-carrera').textContent = ganador.area;
      ticket.classList.add('show');
      
      // Resaltar bola ganadora
      const winnerIdx = Math.min(alumnos.indexOf(ganador), ballElements.length - 1);
      if (ballElements[winnerIdx]) {
        ballElements[winnerIdx].classList.add('winner');
        ballElements[winnerIdx].style.transform = 'scale(1.5)';
      }
      
      // Confeti
      lanzarConfeti();
      
      // Actualizar historial
      actualizarHistorial();
      
      mostrarMensaje(`🎉 ¡${ganador.nombre} es el/a ganador/a!`, 'success');
      
      // Reset botón
      btn.classList.remove('loading');
      btn.disabled = false;
      btn.querySelector('.btn-text').innerHTML = '<i class="ti ti-refresh"></i> Sortear de nuevo';
      
      sorteoActivo = false;
    }, 4500);
  };

  // ===== CONFETI =====
  function lanzarConfeti() {
    const container = $('confetti-container');
    container.innerHTML = '';
    const colores = ['#fbbf24', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#ef4444', '#fff'];
    const formas = ['■', '●', '▲', '★'];
    
    for (let i = 0; i < 80; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.textContent = formas[Math.floor(Math.random() * formas.length)];
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.color = colores[Math.floor(Math.random() * colores.length)];
      confetti.style.fontSize = (8 + Math.random() * 14) + 'px';
      confetti.style.animationDelay = Math.random() * 0.5 + 's';
      confetti.style.animationDuration = (2 + Math.random() * 2.5) + 's';
      container.appendChild(confetti);
    }
    setTimeout(() => container.innerHTML = '', 4000);
  }

  // ===== HISTORIAL =====
  function actualizarHistorial() {
    const section = $('history-section');
    const list = $('history-list');
    section.hidden = false;
    
    list.innerHTML = ganadores.map((g, i) => `
      <div class="history-item">
        <div class="history-num">${i + 1}</div>
        <div class="history-details">
          <div class="history-name">${g.nombre}</div>
          <div class="history-extra">${g.identificador} · ${g.area}</div>
        </div>
        <div class="history-time">${g.hora}</div>
      </div>
    `).reverse().join('');
  }

  // ===== INIT =====
  document.addEventListener('DOMContentLoaded', () => {
    crearEstrellas();
    
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !sorteoActivo && alumnos.length > 0) {
        iniciarSorteo();
      }
    });
  });
</script>

</body>
</html>
